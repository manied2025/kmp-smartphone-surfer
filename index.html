
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMP Smartphone Surfer</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="start-screen" class="screen">
        <h1>KMP Smartphone Surfer</h1>
        <img src="images/logo.png" alt="Game Logo" class="logo"/>
        <button id="start-button">Spiel starten</button>
        <div class="instructions">
            <h2>Anleitung</h2>
            <p>Wische nach links oder rechts, um die Bahn zu wechseln.<br>
            Wische nach oben, um zu springen.<br>
            Sammle Energie, um den Akku aufzuladen.<br>
            Vermeide Hindernisse und bleibe so lange wie möglich am Leben!</p>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over-screen" class="screen">
        <h1>Game Over</h1>
        <p>Dein Akku ist leer!</p>
        <button id="restart-button">Erneut spielen</button>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
