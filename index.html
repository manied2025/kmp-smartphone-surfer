<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Straßenkehrer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-container">
    <canvas id="game" width="960" height="540" aria-label="Straßenkehrer Spiel" role="img"></canvas>
    <section class="hud" aria-live="polite">
      <div class="hud__row">
        <span>Punkte: <strong id="score">0</strong></span>
        <span>Beste: <strong id="highScore">0</strong></span>
      </div>
      <p>Steuerung: A/D oder Pfeile zum Bewegen · W oder Leertaste zum Springen · S zum Kehren</p>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
